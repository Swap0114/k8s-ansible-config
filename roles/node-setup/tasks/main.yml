---
- name: Update apt packages
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - net-tools
    state: present

- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Set timezone to Asia/Kolkata
  timezone:
    name: Asia/Kolkata
