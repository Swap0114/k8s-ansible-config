---
- name: Create alertmanager config directory
  file:
    path: /etc/alertmanager
    state: directory
    mode: '0755'

- name: Deploy alertmanager config
  template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    mode: '0644'

- name: Reload alertmanager if running
  systemd:
    name: alertmanager
    state: reloaded
  ignore_errors: yes
